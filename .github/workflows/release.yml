name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: ztlgr
            asset_name: ztlgr-linux-x86_64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact_name: ztlgr
            asset_name: ztlgr-linux-aarch64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: ztlgr
            asset_name: ztlgr-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: ztlgr
            asset_name: ztlgr-macos-aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: ztlgr.exe
            asset_name: ztlgr-windows-x86_64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar -czf ${{ matrix.asset_name }}.tar.gz ${{ matrix.artifact_name }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: target/${{ matrix.target }}/release/${{ matrix.asset_name }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ztlgr-linux-x86_64/*.tar.gz
            ztlgr-linux-aarch64/*.tar.gz
            ztlgr-macos-x86_64/*.tar.gz
            ztlgr-macos-aarch64/*.tar.gz
            ztlgr-windows-x86_64/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}