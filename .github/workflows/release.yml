name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Generate changelog
        id: changelog
        run: |
          # Get previous tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          
          if [ -z "$PREV_TAG" ]; then
            # First release, get all commits
            CHANGELOG=$(git log --pretty=format:"- %s" --reverse)
          else
            # Get commits since last tag
            CHANGELOG=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s" --reverse)
          fi
          
          # Save changelog to file for multi-line support
          echo "$CHANGELOG" > /tmp/changelog.txt
          
          # Create release notes
          cat > /tmp/release_notes.md << EOF
          ## What's Changed
          
          $CHANGELOG
          
          ## Installation
          
          Download the binary for your platform:
          
          - **Linux x86_64**: \`ztlgr-${{ steps.get_version.outputs.VERSION }}-linux-x86_64.tar.gz\`
          - **Linux ARM64**: \`ztlgr-${{ steps.get_version.outputs.VERSION }}-linux-aarch64.tar.gz\`
          - **macOS x86_64** (Intel): \`ztlgr-${{ steps.get_version.outputs.VERSION }}-macos-x86_64.tar.gz\`
          - **macOS ARM64** (Apple Silicon): \`ztlgr-${{ steps.get_version.outputs.VERSION }}-macos-aarch64.tar.gz\`
          - **Windows x86_64**: \`ztlgr-${{ steps.get_version.outputs.VERSION }}-windows-x86_64.tar.gz\`
          
          ### Quick Install (Linux/macOS)
          
          \`\`\`bash
          # Download and extract
          curl -LO https://github.com/bakudas/ztlgr/releases/download/v${{ steps.get_version.outputs.VERSION }}/ztlgr-${{ steps.get_version.outputs.VERSION }}-$(uname -s)-$(uname -m).tar.gz
          tar -xzf ztlgr-*.tar.gz
          sudo mv ztlgr /usr/local/bin/
          
          # Verify installation
          ztlgr --version
          \`\`\`
          
          ### Install via Cargo
          
          \`\`\`bash
          cargo install ztlgr --version ${{ steps.get_version.outputs.VERSION }}
          \`\`\`
          
          See [INSTALL.md](./INSTALL.md) for detailed installation instructions.
          EOF

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: ztlgr ${{ steps.get_version.outputs.VERSION }}
          body_path: /tmp/release_notes.md
          draft: false
          prerelease: ${{ contains(steps.get_version.outputs.VERSION, '-') }}

  build:
    name: Build ${{ matrix.target }}
    needs: create-release
    runs-on: ${{ matrix.os }}
    
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: ztlgr
            archive: tar.gz
            
          # Linux ARM64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: ztlgr
            archive: tar.gz
            
          # macOS x86_64 (Intel)
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: ztlgr
            archive: tar.gz
            
          # macOS ARM64 (Apple Silicon)
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: ztlgr
            archive: tar.gz
            
          # Windows x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: ztlgr.exe
            archive: zip

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-index-

      - name: Cache target directory
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-${{ matrix.target }}-target-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-target-

      - name: Build binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Get version
        id: get_version
        shell: bash
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Package (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          cd target/${{ matrix.target }}/release
          strip ${{ matrix.artifact }} || true
          tar -czf ztlgr-${{ steps.get_version.outputs.VERSION }}-${{ matrix.target }}.tar.gz ${{ matrix.artifact }}
          sha256sum ztlgr-${{ steps.get_version.outputs.VERSION }}-${{ matrix.target }}.tar.gz > ztlgr-${{ steps.get_version.outputs.VERSION }}-${{ matrix.target }}.sha256

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          7z a ztlgr-${{ steps.get_version.outputs.VERSION }}-${{ matrix.target }}.zip ${{ matrix.artifact }}
          sha256sum ztlgr-${{ steps.get_version.outputs.VERSION }}-${{ matrix.target }}.zip > ztlgr-${{ steps.get_version.outputs.VERSION }}-${{ matrix.target }}.sha256

      - name: Upload Release Asset (Unix)
        if: matrix.os != 'windows-latest'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: target/${{ matrix.target }}/release/ztlgr-${{ steps.get_version.outputs.VERSION }}-${{ matrix.target }}.tar.gz
          asset_name: ztlgr-${{ steps.get_version.outputs.VERSION }}-${{ matrix.target }}.tar.gz
          asset_content_type: application/gzip

      - name: Upload Checksum (Unix)
        if: matrix.os != 'windows-latest'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: target/${{ matrix.target }}/release/ztlgr-${{ steps.get_version.outputs.VERSION }}-${{ matrix.target }}.sha256
          asset_name: ztlgr-${{ steps.get_version.outputs.VERSION }}-${{ matrix.target }}.sha256
          asset_content_type: text/plain

      - name: Upload Release Asset (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: target/${{ matrix.target }}/release/ztlgr-${{ steps.get_version.outputs.VERSION }}-${{ matrix.target }}.zip
          asset_name: ztlgr-${{ steps.get_version.outputs.VERSION }}-${{ matrix.target }}.zip
          asset_content_type: application/zip

      - name: Upload Checksum (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: target/${{ matrix.target }}/release/ztlgr-${{ steps.get_version.outputs.VERSION }}-${{ matrix.target }}.sha256
          asset_name: ztlgr-${{ steps.get_version.outputs.VERSION }}-${{ matrix.target }}.sha256
          asset_content_type: text/plain

  publish-crates-io:
    name: Publish to crates.io
    needs: build
    runs-on: ubuntu-latest
    if: "!contains(github.ref, '-')"
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Publish to crates.io
        run: cargo publish --token ${{ secrets.CRATES_IO_TOKEN }}
        continue-on-error: true