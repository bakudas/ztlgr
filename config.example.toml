# ztlgr configuration

[vault]
# Path to vault database file (default: platform-specific data directory)
# path = "~/.local/share/ztlgr/default.vault"

# Name of the vault
name = "default"

# Auto-backup interval in seconds (0 = disabled)
auto_backup_interval = 3600

# Maximum number of backups to keep
max_backups = 5

[ui]
# Theme: dracula, gruvbox, nord, solarized, or custom theme name
theme = "dracula"

# Sidebar width in percent
sidebar_width = 25

# Show preview panel
show_preview = true

# Show line numbers
show_line_numbers = true

# Show backlinks panel
show_backlinks = true

# Show tags panel
show_tags = true

# Animation frames per second (0 = disabled)
fps = 60

[editor]
# Keybindings style: vim, emacs, default
keybindings = "vim"

# Auto-save interval in seconds (0 = disabled)
auto_save_interval = 30

# Tab width
tab_width = 4

# Use soft tabs (spaces)
soft_tabs = true

# Word wrap
word_wrap = true

# Show whitespace characters
show_whitespace = false

[notes]
# Default note type for new notes
default_type = "permanent"

# Auto-generate Zettel IDs
auto_zettel_id = true

# Default parent for new notes
# default_parent = ""

# Note templates directory
# templates_dir = "~/.config/ztlgr/templates"

[search]
# Use fuzzy search
fuzzy = true

# Case sensitive search
case_sensitive = false

# Maximum results to show
max_results = 50

# Search in content (not just titles)
search_content = true

[graph]
# Show labels on nodes
show_labels = true

# Maximum nodes to display
max_nodes = 100

# Graph layout: force-directed, circular, tree
layout = "force-directed"

# Graph depth to show
depth = 3

[zettelkasten]
# ID style: luhmann, timestamp, custom
id_style = "luhmann"

# Create daily notes automatically
create_daily_notes = true

# Daily note time (HH:MM)
daily_note_time = "00:00"

[vcs]
# Enable git integration (git init on grimoire creation)
enabled = true

# Auto-commit on note save (future feature)
auto_commit = false

# Commit message template ({action} and {details} are replaced)
commit_message = "{action}: {details}"

[llm]
# Enable LLM integration (opt-in, disabled by default)
# ztlgr works 100% without LLM -- this is an optional amplifier
enabled = false

# Provider: ollama (local), openai, anthropic, gemini, openrouter, nvidia
provider = "ollama"

# Model name (provider-specific)
# Ollama: "llama3", "mistral", "codellama", etc.
# OpenAI: "gpt-4o", "gpt-4o-mini", "o3", etc.
# Anthropic: "claude-sonnet-4", "claude-haiku", etc.
# Gemini: "gemini-2.0-flash", "gemini-1.5-pro", etc.
# OpenRouter: "anthropic/claude-3.5-sonnet", "google/gemini-pro", etc.
# NVIDIA: "meta/llama-3.1-8b-instruct", "meta/llama-3.1-70b-instruct", etc.
model = "llama3"

# Override base URL (optional)
# Ollama default: http://localhost:11434
# Gemini default: https://generativelanguage.googleapis.com/v1beta
# OpenRouter default: https://openrouter.ai/api/v1
# NVIDIA default: https://integrate.api.nvidia.com/v1
# Useful for remote instances or API proxies
# api_base = ""

# Environment variable name holding the API key
# The key itself is NEVER stored in config files
# Ollama does not require an API key
# OpenAI: OPENAI_API_KEY
# Anthropic: ANTHROPIC_API_KEY
# Gemini: GOOGLE_API_KEY or GEMINI_API_KEY
# OpenRouter: OPENROUTER_API_KEY
# NVIDIA: NVIDIA_API_KEY
api_key_env = ""

# Maximum tokens to generate per completion
# For literature notes, consider 1500-2500 (reduced from 4096 for concise output)
max_tokens = 4096

# Sampling temperature (0.0 = deterministic, 1.0 = creative)
temperature = 0.7